name: Portal Betina CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint e Verificação de Estilo
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Instalar dependências
      run: npm ci
    
    - name: Executar ESLint
      run: npm run lint
      
    - name: Verificar formatação com Prettier
      run: npm run check-format

  test:
    name: Testes Unitários e de Integração
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Instalar dependências
      run: npm ci
    
    - name: Executar testes
      run: npm test
      
    - name: Gerar relatório de cobertura
      run: npm run test:coverage
      
    - name: Upload relatório de cobertura
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage/

  audit:
    name: Auditoria de Segurança
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Instalar dependências
      run: npm ci
    
    - name: Verificar vulnerabilidades de segurança
      run: npm audit --json > npm-audit.json || true
      
    - name: Upload relatório de vulnerabilidades
      uses: actions/upload-artifact@v3
      with:
        name: security-audit
        path: npm-audit.json

  build:
    name: Build e Verificação de Artefato
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Instalar dependências
      run: npm ci
    
    - name: Construir projeto
      run: npm run build
      
    - name: Verificar artefatos de build
      run: |
        if [ -d "dist" ]; then
          echo "Build bem-sucedido"
          ls -la dist/
        else
          echo "Erro no build"
          exit 1
        fi
      
    - name: Upload artefatos de build
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: dist/

  docker-test:
    name: Teste de Containerização
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Docker
      uses: docker/setup-buildx-action@v2
    
    - name: Construir imagem do frontend
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: portal-betina-frontend:test
        load: true
    
    - name: Construir imagem da API
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.api
        push: false
        tags: portal-betina-api:test
        load: true
    
    - name: Verificar imagens Docker
      run: |
        docker images
        docker image inspect portal-betina-frontend:test
        docker image inspect portal-betina-api:test
