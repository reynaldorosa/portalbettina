version: '3.8'

# Configuração de Docker para ambiente de DESENVOLVIMENTO
# Este arquivo deve ser usado com: docker-compose -f docker-compose.dev.yml up

services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:14-alpine
    container_name: portal-betina-db-dev
    environment:
      POSTGRES_USER: betina_user
      POSTGRES_PASSWORD: betina_password_dev
      POSTGRES_DB: betina_db_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - betina-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betina_user"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  # API Backend
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: portal-betina-api-dev
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=betina_db_dev
      - DB_USER=betina_user
      - DB_PASSWORD=betina_password_dev
      - API_PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
    depends_on:
      - db
    networks:
      - betina-network-dev
    command: npm run dev:api
  
  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: portal-betina-frontend-dev
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    depends_on:
      - api
    networks:
      - betina-network-dev
    command: npm run dev

volumes:
  postgres_data_dev:

networks:
  betina-network-dev:
    driver: bridge
